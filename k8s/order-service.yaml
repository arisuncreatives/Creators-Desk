# 1. The Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ecom-platform-order-service:latest
          imagePullPolicy: Never 
          ports:
            - containerPort: 5003
          envFrom:
            - secretRef:
                name: ecom-secrets

---
# 2. The Internal Service
apiVersion: v1
kind: Service
metadata:
  name: order-service 
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - port: 5003
      targetPort: 5003