# 1. The Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: ecom-platform-cart-service:latest
          imagePullPolicy: Never 
          ports:
            - containerPort: 5005
          envFrom:
            - secretRef:
                name: ecom-secrets

---
# 2. The Internal Service
apiVersion: v1
kind: Service
metadata:
  name: cart-service 
spec:
  type: ClusterIP
  selector:
    app: cart-service
  ports:
    - port: 5005
      targetPort: 5005